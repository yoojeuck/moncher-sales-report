name: 판매일보 자동 수집

on:
  schedule:
    # 매일 오전 5시 KST = UTC 20:00
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "단일 날짜 (YYYY-MM-DD, 비우면 어제)"
        required: false
        default: ""
      date_from:
        description: "기간 시작일 (YYYY-MM-DD)"
        required: false
        default: ""
      date_to:
        description: "기간 종료일 (YYYY-MM-DD, 비우면 오늘)"
        required: false
        default: ""
      collect_all:
        description: "전체 기간 수집 (true — 시간 오래 걸림)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: 의존성 설치
        run: pip install -r scraper/requirements.txt

      - name: 스크래핑 실행
        env:
          DAOU_ID: ${{ secrets.DAOU_ID }}
          DAOU_PW: ${{ secrets.DAOU_PW }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.collect_all }}" = "true" ]; then
            python scraper/scrape.py --all

          elif [ -n "${{ github.event.inputs.date_from }}" ]; then
            FROM="${{ github.event.inputs.date_from }}"
            TO="${{ github.event.inputs.date_to }}"
            if [ -z "$TO" ]; then
              python scraper/scrape.py --from "$FROM"
            else
              python scraper/scrape.py --from "$FROM" --to "$TO"
            fi

          elif [ -n "${{ github.event.inputs.target_date }}" ]; then
            python scraper/scrape.py "${{ github.event.inputs.target_date }}"

          else
            # 기본: 어제 날짜 수집 (스케줄 실행 또는 날짜 미입력)
            python scraper/scrape.py
          fi

      - name: 데이터 파일 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posts.json data/summaries.json
          git diff --cached --quiet || git commit -m "📊 판매일보 자동 수집 $(date '+%Y-%m-%d')"
          git push
