name: 판매일보 AI 요약 보충

on:
  schedule:
    # 매일 오전 5시 30분 KST = UTC 20:30
    - cron: "30 20 * * *"
  workflow_dispatch:
    inputs:
      summarize_from:
        description: "요약 보충 시작일 (YYYY-MM-DD, 비우면 전체 미완료)"
        required: false
        default: ""
      summarize_to:
        description: "요약 보충 종료일 (YYYY-MM-DD)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      - name: Python 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: 의존성 설치
        run: pip install -r scraper/requirements.txt

      - name: AI 요약 보충 실행
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          FROM="${{ github.event.inputs.summarize_from }}"
          TO="${{ github.event.inputs.summarize_to }}"
          if [ -n "$FROM" ] && [ -n "$TO" ]; then
            python scraper/scrape.py --summarize --from "$FROM" --to "$TO"
          elif [ -n "$FROM" ]; then
            python scraper/scrape.py --summarize --from "$FROM"
          else
            python scraper/scrape.py --summarize
          fi

      - name: 데이터 파일 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/summaries.json
          git diff --cached --quiet || git commit -m "🤖 AI 요약 자동 보충 $(date '+%Y-%m-%d')"
          git push

