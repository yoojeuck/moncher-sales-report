<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>몬쉘 판매일보 대시보드</title>
<style>
  :root {
    --primary: #6c63ff;
    --primary-light: #ede9fe;
    --urgent: #ef4444;
    --urgent-light: #fee2e2;
    --week: #f59e0b;
    --week-light: #fef3c7;
    --watch: #10b981;
    --watch-light: #d1fae5;
    --bg: #f8f7ff;
    --card: #ffffff;
    --text: #1e1b4b;
    --muted: #6b7280;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Layout */
  .layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

  /* Sidebar */
  .sidebar { background: var(--card); border-right: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; gap: 24px; }
  .brand { text-align: center; }
  .brand h1 { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
  .brand p { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  /* Calendar */
  .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .calendar-title { font-weight: 700; font-size: 0.95rem; }
  .cal-nav { background: none; border: 1px solid var(--border); border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 0.85rem; color: var(--text); }
  .cal-nav:hover { background: var(--primary-light); }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-dow { text-align: center; font-size: 0.65rem; font-weight: 600; color: var(--muted); padding: 4px 0; }
  .cal-day { text-align: center; padding: 5px 2px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; position: relative; transition: background 0.15s; min-height: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
  .cal-day:hover { background: var(--primary-light); }
  .cal-day.has-data::after { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--primary); display: block; }
  .cal-day.selected { background: var(--primary); color: white; font-weight: 700; }
  .cal-day.selected::after { background: white; }
  .cal-day.other-month { color: var(--border); cursor: default; }
  .cal-day.other-month:hover { background: none; }
  .cal-day.today { border: 2px solid var(--primary); }

  /* Date list fallback */
  .date-list { display: flex; flex-direction: column; gap: 4px; max-height: 300px; overflow-y: auto; }
  .date-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; cursor: pointer; text-align: left; font-size: 0.85rem; transition: all 0.15s; }
  .date-btn:hover { background: var(--primary-light); border-color: var(--primary); }
  .date-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
  .date-btn .post-count { font-size: 0.7rem; opacity: 0.7; float: right; }

  /* Main */
  .main { padding: 24px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
  .main-header { display: flex; align-items: center; justify-content: space-between; }
  .main-header h2 { font-size: 1.4rem; font-weight: 700; }
  .badge-date { background: var(--primary-light); color: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }

  /* Cards */
  .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
  .card-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

  /* Summary */
  .summary-text { font-size: 1rem; line-height: 1.7; color: var(--text); }

  /* Highlights */
  .highlights { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .highlight-tag { background: var(--primary-light); color: var(--primary); padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; }

  /* Tasks */
  .tasks { display: flex; flex-direction: column; gap: 10px; }
  .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
  .task-item.p-urgent { border-left: 4px solid var(--urgent); background: var(--urgent-light); }
  .task-item.p-week { border-left: 4px solid var(--week); background: var(--week-light); }
  .task-item.p-watch { border-left: 4px solid var(--watch); background: var(--watch-light); }
  .priority-badge { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .p-urgent .priority-badge { background: var(--urgent); color: white; }
  .p-week .priority-badge { background: var(--week); color: white; }
  .p-watch .priority-badge { background: var(--watch); color: white; }
  .task-info { flex: 1; }
  .task-store { font-size: 0.75rem; color: var(--muted); margin-bottom: 2px; }
  .task-action { font-size: 0.9rem; line-height: 1.5; }

  /* Store grid */
  .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .store-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .store-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 6px; color: var(--primary); }
  .store-summary { font-size: 0.85rem; line-height: 1.5; color: #374151; }

  /* Raw posts */
  .posts-list { display: flex; flex-direction: column; gap: 12px; }
  .post-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .post-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--bg); cursor: pointer; }
  .post-header:hover { background: var(--primary-light); }
  .post-store { font-weight: 700; font-size: 0.9rem; }
  .post-time { font-size: 0.75rem; color: var(--muted); }
  .post-toggle { font-size: 0.8rem; color: var(--muted); }
  .post-content { padding: 14px 16px; font-size: 0.875rem; line-height: 1.7; white-space: pre-wrap; display: none; border-top: 1px solid var(--border); }
  .post-content.open { display: block; }

  /* Loading / empty */
  .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
  .loading .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 0.9rem; }

  /* Responsive */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <h1>🍫 몬쉘</h1>
      <p>판매일보 대시보드</p>
    </div>

    <!-- Calendar -->
    <div>
      <div class="calendar-header">
        <button class="cal-nav" id="prevMonth">‹</button>
        <span class="calendar-title" id="calMonthTitle"></span>
        <button class="cal-nav" id="nextMonth">›</button>
      </div>
      <div class="calendar-grid" id="calDows">
        <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
        <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
      </div>
      <div class="calendar-grid" id="calGrid"></div>
    </div>

    <!-- Recent dates list -->
    <div>
      <div class="card-title">📅 최근 날짜</div>
      <div class="date-list" id="dateList"></div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main">
    <div class="main-header">
      <h2 id="mainTitle">날짜를 선택하세요</h2>
      <span class="badge-date" id="badgeDate" style="display:none"></span>
    </div>

    <div id="contentArea">
      <div class="loading">
        <div class="spinner"></div>
        <p>데이터 로드 중...</p>
      </div>
    </div>
  </main>
</div>

<script>
const POSTS_URL   = "https://raw.githubusercontent.com/yoojeuck/moncher-sales-report/main/data/posts.json";
const SUMMARY_URL = "https://raw.githubusercontent.com/yoojeuck/moncher-sales-report/main/data/summaries.json";

let allPosts = {}, allSummaries = {}, availableDates = [];
let calYear, calMonth, selectedDate = null;

// ── 데이터 로드 ──────────────────────────────────────────────────
async function loadData() {
  try {
    const [postsRes, sumRes] = await Promise.all([
      fetch(POSTS_URL + "?t=" + Date.now()),
      fetch(SUMMARY_URL + "?t=" + Date.now())
    ]);
    allPosts     = postsRes.ok     ? await postsRes.json()  : {};
    allSummaries = sumRes.ok       ? await sumRes.json()    : {};
  } catch(e) {
    allPosts = {}; allSummaries = {};
  }

  availableDates = Object.keys(allPosts).sort().reverse();

  renderDateList();
  renderCalendar();

  if (availableDates.length > 0) {
    selectDate(availableDates[0]);
  } else {
    document.getElementById("contentArea").innerHTML =
      '<div class="empty">📭 아직 수집된 데이터가 없습니다.<br>GitHub Actions를 실행해 주세요.</div>';
  }
}

// ── 날짜 목록 ────────────────────────────────────────────────────
function renderDateList() {
  const list = document.getElementById("dateList");
  const recent = availableDates.slice(0, 10);
  if (recent.length === 0) { list.innerHTML = '<div class="empty">데이터 없음</div>'; return; }
  list.innerHTML = recent.map(d => {
    const cnt = (allPosts[d] || []).length;
    return `<button class="date-btn" data-date="${d}" onclick="selectDate('${d}')">
      ${d} <span class="post-count">${cnt}건</span>
    </button>`;
  }).join("");
}

// ── 캘린더 ───────────────────────────────────────────────────────
function initCalendar() {
  const now = new Date();
  calYear  = now.getFullYear();
  calMonth = now.getMonth();
}

function renderCalendar() {
  const title = document.getElementById("calMonthTitle");
  title.textContent = `${calYear}년 ${calMonth + 1}월`;

  const grid = document.getElementById("calGrid");
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date().toISOString().slice(0, 10);

  let html = "";
  for (let i = 0; i < firstDay; i++) {
    html += `<div class="cal-day other-month"></div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasData = availableDates.includes(dateStr);
    const isSel   = dateStr === selectedDate;
    const isToday = dateStr === today;
    html += `<div class="cal-day ${hasData?'has-data':''} ${isSel?'selected':''} ${isToday?'today':''}"
      ${hasData ? `onclick="selectDate('${dateStr}')" title="${(allPosts[dateStr]||[]).length}건"` : ''}
    >${d}</div>`;
  }
  grid.innerHTML = html;
}

document.getElementById("prevMonth").onclick = () => {
  calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
};
document.getElementById("nextMonth").onclick = () => {
  calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
};

// ── 날짜 선택 ────────────────────────────────────────────────────
function selectDate(date) {
  selectedDate = date;

  document.querySelectorAll(".date-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.date === date);
  });

  const [y, m] = date.split("-").map(Number);
  calYear = y; calMonth = m - 1;
  renderCalendar();

  document.getElementById("mainTitle").textContent = `${date} 판매일보`;
  const badge = document.getElementById("badgeDate");
  badge.style.display = "";
  badge.textContent = `${(allPosts[date]||[]).length}개 매장`;

  renderContent(date);
}

// ── 콘텐츠 렌더링 ────────────────────────────────────────────────
function renderContent(date) {
  const posts   = allPosts[date]    || [];
  const summary = allSummaries[date] || null;
  let html = "";

  if (summary) {
    html += `<div class="card">
      <div class="card-title">🤖 AI 종합 요약</div>
      <div class="summary-text">${escHtml(summary.overall_summary || "")}</div>`;

    if (summary.highlights && summary.highlights.length > 0) {
      html += `<div class="highlights">`;
      summary.highlights.forEach(h => {
        html += `<span class="highlight-tag">💡 ${escHtml(h)}</span>`;
      });
      html += `</div>`;
    }
    html += `</div>`;

    if (summary.tasks && summary.tasks.length > 0) {
      html += `<div class="card">
        <div class="card-title">⚡ 업무 과제</div>
        <div class="tasks">`;
      summary.tasks.forEach(t => {
        const cls = t.priority === "즉시처리" ? "p-urgent"
                  : t.priority === "이번주"   ? "p-week"
                  : "p-watch";
        html += `<div class="task-item ${cls}">
          <span class="priority-badge">${escHtml(t.priority||"")}</span>
          <div class="task-info">
            <div class="task-store">📍 ${escHtml(t.store||"")}</div>
            <div class="task-action">${escHtml(t.action||"")}</div>
          </div>
        </div>`;
      });
      html += `</div></div>`;
    }

    if (summary.store_summaries && Object.keys(summary.store_summaries).length > 0) {
      html += `<div class="card">
        <div class="card-title">🏪 매장별 요약</div>
        <div class="store-grid">`;
      for (const [store, text] of Object.entries(summary.store_summaries)) {
        html += `<div class="store-card">
          <div class="store-name">${escHtml(store)}</div>
          <div class="store-summary">${escHtml(text)}</div>
        </div>`;
      }
      html += `</div></div>`;
    }
  } else {
    html += `<div class="card">
      <div class="card-title">🤖 AI 요약</div>
      <div class="empty">이 날짜의 AI 요약이 아직 없습니다.<br>스크래퍼 실행 시 자동으로 생성됩니다.</div>
    </div>`;
  }

  if (posts.length > 0) {
    html += `<div class="card">
      <div class="card-title">📋 원문 판매일보 (${posts.length}건)</div>
      <div class="posts-list">`;
    posts.forEach((p, i) => {
      const time = p.createdAt ? p.createdAt.replace("T", " ").slice(0,16) : "";
      html += `<div class="post-card">
        <div class="post-header" onclick="togglePost(${i})">
          <span class="post-store">🏪 ${escHtml(p.store||"(이름없음)")}</span>
          <span class="post-time">${time}</span>
          <span class="post-toggle" id="tog-${i}">▲</span>
        </div>
        <div class="post-content open" id="pc-${i}">${escHtml(p.content||"(내용없음)")}</div>
      </div>`;
    });
    html += `</div></div>`;
  } else {
    html += `<div class="card"><div class="empty">이 날짜에 게시글이 없습니다.</div></div>`;
  }

  document.getElementById("contentArea").innerHTML = html;
}

function togglePost(i) {
  const el  = document.getElementById("pc-" + i);
  const tog = document.getElementById("tog-" + i);
  if (el.classList.toggle("open")) {
    tog.textContent = "▲";
  } else {
    tog.textContent = "▼";
  }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;")
    .replace(/\n/g,"<br>");
}

// ── 초기화 ───────────────────────────────────────────────────────
initCalendar();
loadData();
</script>
</body>
</html>
